services:
  # Object Storage
  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web UI
    command: server /data --console-address ":9001"

  # Catalog
  nessie:
    image: projectnessie/nessie:0.76.6
    container_name: nessie
    ports:
      - "19120:19120" # Web UI
      - "19000:9000"  # REST API
