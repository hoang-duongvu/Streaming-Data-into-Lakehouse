services:
  flink-jobmanager:
    build:
      context: .
      dockerfile: ./dockerfile/Dockerfile.flink
    container_name: flink-jobmanager
    ports:
      - "18081:8081"
    command: jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - PYFLINK_PYTHON=/usr/bin/python

  flink-taskmanager:
    build:
      context: .
      dockerfile: ./dockerfile/Dockerfile.flink
    depends_on:
      - flink-jobmanager
    container_name: flink-taskmanager
    command: taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - PYFLINK_PYTHON=/usr/bin/python
