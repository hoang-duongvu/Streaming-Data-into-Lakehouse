services:
  flink-jobmanager:
    # image: dvuhoang/pyflink:1.20.3
    image: pyflink:1.20.3
    pull_policy: never
    container_name: flink-jobmanager
    ports:
      - "18081:8081"
    command: jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - PYFLINK_PYTHON=/usr/bin/python
    volumes:
      - ./pipeline/flink_jobs:/opt/flink/flink_jobs

  flink-taskmanager:
    # image: dvuhoang/pyflink:1.20.3
    image: pyflink:1.20.3
    pull_policy: never
    depends_on:
      - flink-jobmanager
    container_name: flink-taskmanager
    command: taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - PYFLINK_PYTHON=/usr/bin/python
    volumes:
      - ./pipeline/flink_jobs:/opt/flink/flink_jobs
